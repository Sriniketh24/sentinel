name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.12.0
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        env:
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
          HF_API_TOKEN: ""
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sentinel:${{ github.sha }} .
      - name: Verify image runs
        run: |
          docker run -d --name sentinel-test -p 8000:8000 \
            -e QDRANT_URL=http://host.docker.internal:6333 \
            -e REDIS_URL=redis://host.docker.internal:6379/0 \
            -e HF_API_TOKEN="" \
            sentinel:${{ github.sha }}
          sleep 5
          docker logs sentinel-test
          docker stop sentinel-test
